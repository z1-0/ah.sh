name: Update Supported Languages

on:
  schedule:
    - cron: "0 0 * * 1" # Every Monday at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Language Lists
        run: |
          mkdir -p src/assets/providers/devenv src/assets/providers/dev-templates

          # Fetch devenv languages
          curl -s "https://api.github.com/repos/cachix/devenv/contents/src/modules/languages" | \
          jq -r '[.[] | select((.type == "file" and (.name | endswith(".nix"))) or .type == "dir") | .name | sub("\\.nix$"; "")] | unique | sort' \
          > src/assets/providers/devenv/supported_languages.json

          # Fetch dev-templates languages
          curl -s "https://api.github.com/repos/the-nix-way/dev-templates/contents" | \
          jq -r '[.[] | select(.type == "dir" and .name != ".github" and .name != ".git") | .name] | sort' \
          > src/assets/providers/dev-templates/supported_languages.json

      - name: Report Changes
        run: |
          echo "Devenv Languages Size: $(stat -c %s src/assets/providers/devenv/supported_languages.json) bytes"
          echo "Dev-templates Languages Size: $(stat -c %s src/assets/providers/dev-templates/supported_languages.json) bytes"
          git diff --stat

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update supported languages list"
          title: "chore: update supported languages list"
          body: |
            This is an automated PR to update the static language lists for all providers.
            - `src/assets/providers/devenv/supported_languages.json`
            - `src/assets/providers/dev-templates/supported_languages.json`
          branch: update-supported-languages
          base: main
          delete-branch: true

      - name: Comment when no changes
        if: steps.cpr.outputs.pull-request-number != '' && steps.cpr.outputs.pull-request-operation == 'none'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ steps.cpr.outputs.pull-request-number }}'),
              body: 'No code changes in this run.'
            })
